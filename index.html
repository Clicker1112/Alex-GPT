<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Chat avec Alex</title>
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;700;800&family=DM+Mono:wght@300;400&display=swap" rel="stylesheet"/>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #0e0e12;
      --surface: #16161d;
      --border: #2a2a38;
      --accent: #c8f060;
      --accent-dim: #8fac3a;
      --text: #eeeef2;
      --muted: #6b6b82;
      --bubble-user: #1e1e2e;
      --bubble-alex: #1a1f10;
      --font-display: 'Syne', sans-serif;
      --font-mono: 'DM Mono', monospace;
    }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: var(--font-mono);
      height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      overflow: hidden;
    }

    /* Background noise texture */
    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='0.04'/%3E%3C/svg%3E");
      pointer-events: none;
      z-index: 0;
    }

    .container {
      position: relative;
      z-index: 1;
      width: 100%;
      max-width: 600px;
      height: 100vh;
      display: flex;
      flex-direction: column;
      padding: 0 12px;
    }

    /* Header */
    header {
      display: flex;
      align-items: center;
      gap: 14px;
      padding: 24px 0 18px;
      border-bottom: 1px solid var(--border);
    }

    .avatar {
      width: 46px;
      height: 46px;
      border-radius: 50%;
      background: var(--accent);
      display: flex;
      align-items: center;
      justify-content: center;
      font-family: var(--font-display);
      font-weight: 800;
      font-size: 18px;
      color: #0e0e12;
      flex-shrink: 0;
      box-shadow: 0 0 20px rgba(200,240,96,0.25);
      animation: pulse 3s ease-in-out infinite;
    }

    @keyframes pulse {
      0%, 100% { box-shadow: 0 0 20px rgba(200,240,96,0.25); }
      50% { box-shadow: 0 0 35px rgba(200,240,96,0.45); }
    }

    .header-info h1 {
      font-family: var(--font-display);
      font-weight: 800;
      font-size: 18px;
      letter-spacing: -0.02em;
      color: var(--text);
    }

    .status {
      font-size: 11px;
      color: var(--accent);
      display: flex;
      align-items: center;
      gap: 5px;
      margin-top: 2px;
    }

    .status::before {
      content: '';
      width: 6px;
      height: 6px;
      border-radius: 50%;
      background: var(--accent);
      animation: blink 1.8s ease-in-out infinite;
    }

    @keyframes blink {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.3; }
    }

    /* Messages */
    .messages {
      flex: 1;
      overflow-y: auto;
      padding: 20px 0;
      display: flex;
      flex-direction: column;
      gap: 16px;
      scrollbar-width: thin;
      scrollbar-color: var(--border) transparent;
    }

    .messages::-webkit-scrollbar { width: 4px; }
    .messages::-webkit-scrollbar-track { background: transparent; }
    .messages::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }

    .msg {
      display: flex;
      gap: 10px;
      animation: slideUp 0.3s cubic-bezier(0.16, 1, 0.3, 1) both;
    }

    @keyframes slideUp {
      from { opacity: 0; transform: translateY(12px); }
      to { opacity: 1; transform: translateY(0); }
    }

    .msg.user { flex-direction: row-reverse; }

    .msg-avatar {
      width: 30px;
      height: 30px;
      border-radius: 50%;
      flex-shrink: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 12px;
      font-weight: 700;
      font-family: var(--font-display);
      margin-top: 2px;
    }

    .msg.alex .msg-avatar {
      background: var(--accent);
      color: #0e0e12;
    }

    .msg.user .msg-avatar {
      background: var(--border);
      color: var(--muted);
    }

    .bubble {
      max-width: 78%;
      padding: 11px 15px;
      border-radius: 16px;
      font-size: 14px;
      line-height: 1.6;
      letter-spacing: 0.01em;
    }

    .msg.alex .bubble {
      background: var(--bubble-alex);
      border: 1px solid rgba(200,240,96,0.15);
      border-bottom-left-radius: 4px;
      color: var(--text);
    }

    .msg.user .bubble {
      background: var(--bubble-user);
      border: 1px solid var(--border);
      border-bottom-right-radius: 4px;
      color: var(--text);
    }

    /* Typing indicator */
    .typing .bubble {
      display: flex;
      gap: 5px;
      align-items: center;
      padding: 14px 18px;
    }

    .dot {
      width: 7px;
      height: 7px;
      border-radius: 50%;
      background: var(--accent-dim);
      animation: bounce 1.2s ease-in-out infinite;
    }

    .dot:nth-child(2) { animation-delay: 0.2s; }
    .dot:nth-child(3) { animation-delay: 0.4s; }

    @keyframes bounce {
      0%, 60%, 100% { transform: translateY(0); }
      30% { transform: translateY(-6px); }
    }

    /* Input */
    .input-area {
      padding: 16px 0 24px;
      border-top: 1px solid var(--border);
      display: flex;
      gap: 10px;
      align-items: flex-end;
    }

    textarea {
      flex: 1;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 12px;
      color: var(--text);
      font-family: var(--font-mono);
      font-size: 14px;
      padding: 12px 14px;
      resize: none;
      outline: none;
      line-height: 1.5;
      max-height: 120px;
      transition: border-color 0.2s;
    }

    textarea:focus { border-color: var(--accent-dim); }
    textarea::placeholder { color: var(--muted); }

    button {
      width: 44px;
      height: 44px;
      border-radius: 12px;
      background: var(--accent);
      border: none;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
      transition: transform 0.15s, background 0.2s;
    }

    button:hover { transform: scale(1.06); background: #d9ff6e; }
    button:active { transform: scale(0.96); }

    button svg { width: 18px; height: 18px; fill: #0e0e12; }

    /* Welcome message */
    .welcome {
      text-align: center;
      padding: 30px 0 10px;
      color: var(--muted);
      font-size: 12px;
    }

    .welcome span {
      display: inline-block;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 20px;
      padding: 5px 14px;
    }
  </style>
</head>
<body>
<div class="container">
  <header>
    <div class="avatar">A</div>
    <div class="header-info">
      <h1>Alex</h1>
      <div class="status">en ligne</div>
    </div>
  </header>

  <div class="messages" id="messages">
    <div class="welcome"><span>Début de la conversation</span></div>
  </div>

  <div class="input-area">
    <textarea id="input" rows="1" placeholder="Écrivez un message…"></textarea>
    <button id="send" title="Envoyer">
      <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
        <path d="M2.01 21L23 12 2.01 3 2 10l15 2-15 2z"/>
      </svg>
    </button>
  </div>
</div>

<script>
  const messages = document.getElementById('messages');
  const input = document.getElementById('input');
  const sendBtn = document.getElementById('send');

  function addMessage(text, role) {
    const msg = document.createElement('div');
    msg.className = `msg ${role}`;
    const av = document.createElement('div');
    av.className = 'msg-avatar';
    av.textContent = role === 'alex' ? 'A' : 'V';
    const bubble = document.createElement('div');
    bubble.className = 'bubble';
    bubble.textContent = text;
    msg.appendChild(av);
    msg.appendChild(bubble);
    messages.appendChild(msg);
    messages.scrollTop = messages.scrollHeight;
  }

  function showTyping() {
    const msg = document.createElement('div');
    msg.className = 'msg alex typing';
    msg.id = 'typing';
    msg.innerHTML = `
      <div class="msg-avatar">A</div>
      <div class="bubble">
        <span class="dot"></span>
        <span class="dot"></span>
        <span class="dot"></span>
      </div>`;
    messages.appendChild(msg);
    messages.scrollTop = messages.scrollHeight;
  }

  function removeTyping() {
    const t = document.getElementById('typing');
    if (t) t.remove();
  }

  const alexMessages = [
    "Bonjou je sui Alex et j'et un vie normal",
    "aajdzcniedmskspdojbegggahgd",
    "je sui une labubu chantier",
    "aurevoi"
  ];

  const container = document.querySelector('.container');

  function resetChat() {
    container.style.transition = 'opacity 0.5s ease';
    container.style.opacity = '0';
    setTimeout(() => {
      messages.innerHTML = '<div class="welcome"><span>Début de la conversation</span></div>';
      input.disabled = false;
      sendBtn.disabled = false;
      container.style.opacity = '1';
    }, 700);
  }

  function send() {
    const text = input.value.trim();
    if (!text) return;
    addMessage(text, 'user');
    input.value = '';
    input.style.height = 'auto';
    sendBtn.disabled = true;

    showTyping();
    setTimeout(() => {
      removeTyping();
      const normalized = text.trim().toLowerCase();
      let pick;
      if (normalized === 'bonjour') {
        pick = alexMessages[0];
      } else {
        const r = Math.random();
        pick = r < 0.2833 ? alexMessages[0]
             : r < 0.5667 ? alexMessages[1]
             : r < 0.85   ? alexMessages[2]
             :               alexMessages[3];
      }
      addMessage(pick, 'alex');

      if (pick === 'aurevoi') {
        input.disabled = true;
        setTimeout(() => {
          const overlay = document.createElement('div');
          overlay.id = 'reset-overlay';
          overlay.textContent = 'la discussion est reset';
          overlay.style.cssText = `
            position: fixed; inset: 0; z-index: 999;
            display: flex; align-items: center; justify-content: center;
            background: #0e0e12;
            font-family: 'Syne', sans-serif;
            font-size: clamp(2rem, 8vw, 5rem);
            font-weight: 800;
            color: #ffffff;
            text-align: center;
            padding: 20px;
            opacity: 0;
            transition: opacity 0.4s ease;
          `;
          document.body.appendChild(overlay);
          requestAnimationFrame(() => {
            requestAnimationFrame(() => { overlay.style.opacity = '1'; });
          });
          setTimeout(() => {
            overlay.style.opacity = '0';
            setTimeout(() => {
              overlay.remove();
              resetChat();
            }, 400);
          }, 1800);
        }, 1000);
      } else {
        sendBtn.disabled = false;
      }
    }, 900 + Math.random() * 600);
  }

  sendBtn.addEventListener('click', send);

  input.addEventListener('keydown', e => {
    if (e.key === 'Enter' && !e.shiftKey) {
      e.preventDefault();
      send();
    }
  });

  input.addEventListener('input', () => {
    input.style.height = 'auto';
    input.style.height = Math.min(input.scrollHeight, 120) + 'px';
  });
</script>
</body>
</html>
